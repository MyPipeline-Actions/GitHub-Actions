---
name: Scheduled Pipeline

on:
  schedule:
    - cron: '0 2 * * *'

jobs:
  nightly-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Nightly Build
        run: echo "Running nightly build"

---
name: CI Pipeline

on:
  push:
    branches: [ main ]

  pull_request:
    branches: [ main ]

  schedule:
    - cron: '0 2 * * *'

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Application
        run: echo "Building application"

      - name: Run Tests
        run: echo "Running tests"