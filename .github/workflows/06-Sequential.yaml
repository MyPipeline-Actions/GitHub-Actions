name: CI/CD Pipeline-Sequential-demo
on: push
jobs:

  build:
    runs-on: ubuntu-latest
    steps:
      - run: echo "Build application"

  unit-test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - run: echo "Run unit tests"

  integration-test:
    runs-on: ubuntu-latest
    needs: unit-test #build 
    steps:
      - run: echo "Run integration tests"

  deploy:
    runs-on: ubuntu-latest
    needs: [unit-test, integration-test]
    steps:
      - run: echo "Deploy application"